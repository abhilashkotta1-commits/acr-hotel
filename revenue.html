<!DOCTYPE html>
<html lang="en">
<head>
  <script src="db.js"></script>
  <meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ACR Hotel">
  <meta name="theme-color" content="#1e293b">
  <title>Amma Cheti Ruchulu — Daily Revenue</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Telugu:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --green:   #10b981;
      --red:     #ef4444;
      --bg:      #f8fafc;
      --card:    #ffffff;
      --border:  #e2e8f0;
      --text:    #1e293b;
      --muted:   #64748b;
      --radius:  12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      color: white; padding: 14px 16px;
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header-title { font-size: 17px; font-weight: 700; }
    .header-sub   { font-size: 11px; opacity: .65; margin-top: 2px; }

    /* ── Tabs ── */
    .tabs {
      display: flex; background: white;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 57px; z-index: 99;
    }
    .tab {
      flex: 1; padding: 11px 4px; text-align: center;
      font-size: 12px; font-weight: 500; color: var(--muted);
      cursor: pointer; border-bottom: 2px solid transparent;
      white-space: nowrap; transition: all .2s;
    }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

    /* ── Content ── */
    .content { padding: 14px; max-width: 560px; margin: 0 auto; }

    /* ── Date bar ── */
    .date-bar {
      background: white; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 11px 14px;
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .date-bar label { font-size: 13px; color: var(--muted); font-weight: 500; white-space: nowrap; }
    .date-bar input {
      flex: 1; border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none;
    }
    .date-bar input:focus { border-color: var(--primary); }

    /* ── Edit banner ── */
    .edit-banner {
      background: #fef9c3; border: 1px solid #fde047;
      border-radius: var(--radius); padding: 10px 14px;
      font-size: 12px; color: #854d0e;
      margin-bottom: 12px; display: none; align-items: center; gap: 8px;
    }
    .edit-banner.show { display: flex; }

    /* ── Section cards ── */
    .section-card {
      background: white; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 15px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
    }
    .sec-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .sec-info { flex: 1; min-width: 0; }
    .sec-label-en { font-size: 13px; font-weight: 600; color: var(--text); }
    .sec-label-te { font-size: 12px; color: var(--muted); font-family: 'Noto Sans Telugu', sans-serif; margin-top: 1px; }
    .sec-input-wrap { position: relative; flex-shrink: 0; }
    .sec-rupee {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      font-size: 15px; font-weight: 600; color: var(--muted); pointer-events: none;
    }
    .sec-input {
      width: 110px; padding: 10px 10px 10px 24px;
      border: 2px solid var(--border); border-radius: 10px;
      font-size: 16px; font-weight: 700; font-family: 'Inter', sans-serif;
      text-align: right; outline: none; color: var(--text);
      transition: border-color .2s, background .2s;
    }
    .sec-input:focus { border-color: var(--primary); }
    .sec-input.has-value { border-color: var(--green); background: #f0fdf4; color: var(--green); }

    /* ── Grand total bar ── */
    .total-bar {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      color: white; border-radius: var(--radius); padding: 15px 16px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .total-label { font-size: 13px; opacity: .75; }
    .total-value { font-size: 24px; font-weight: 800; color: #4ade80; }

    /* ── Save button ── */
    .btn-save {
      background: var(--green); color: white; border: none;
      border-radius: var(--radius); padding: 15px; font-size: 15px;
      font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif;
      width: 100%; letter-spacing: .3px; transition: background .2s;
    }
    .btn-save:hover   { background: #059669; }
    .btn-save.editing { background: var(--primary); }
    .btn-save.editing:hover { background: #1d4ed8; }

    /* ── Success flash ── */
    .success-flash {
      display: none; background: #f0fdf4; border: 1.5px solid var(--green);
      border-radius: var(--radius); padding: 14px 16px; text-align: center;
      margin-bottom: 14px;
    }
    .success-flash.show { display: block; }
    .sf-icon { font-size: 28px; margin-bottom: 4px; }
    .sf-text { font-size: 14px; font-weight: 600; color: var(--green); }
    .sf-sub  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── History ── */
    .hist-entry {
      background: white; border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
    }
    .hist-head {
      padding: 12px 14px; display: flex;
      justify-content: space-between; align-items: center; cursor: pointer;
    }
    .hist-head:hover { background: #f8fafc; }
    .hist-date  { font-size: 13px; font-weight: 600; }
    .hist-total { font-size: 15px; font-weight: 800; color: var(--green); }
    .hist-arrow { font-size: 11px; color: var(--muted); margin-left: 8px; transition: transform .2s; }
    .hist-head.open .hist-arrow { transform: rotate(180deg); }
    .hist-body  { display: none; border-top: 1px solid var(--border); }
    .hist-body.open { display: block; }
    .hist-row {
      display: flex; align-items: center; padding: 9px 14px;
      border-bottom: 1px solid #f8fafc; font-size: 13px;
    }
    .hist-row:last-child { border-bottom: none; }
    .hist-sec-icon { font-size: 16px; margin-right: 8px; }
    .hist-sec-name { flex: 1; font-weight: 500; }
    .hist-sec-amt  { font-weight: 700; }
    .hist-actions  {
      padding: 10px 14px; border-top: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .btn-edit-entry {
      flex: 1; padding: 9px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;
      border: 1.5px solid var(--primary); background: white; color: var(--primary);
    }
    .btn-del-entry {
      padding: 9px 14px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;
      border: 1.5px solid #fee2e2; background: #fff5f5; color: var(--red);
    }

    /* ── Weekly / Monthly ── */
    .period-bar {
      background: white; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 11px 14px;
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .period-bar label { font-size: 13px; color: var(--muted); font-weight: 500; white-space: nowrap; }
    .period-bar input, .period-bar select {
      flex: 1; border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none;
    }
    .period-bar input:focus { border-color: var(--primary); }

    .agg-card {
      background: white; border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; margin-bottom: 12px;
    }
    .agg-head { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .agg-head h3 { font-size: 13px; font-weight: 600; }
    .agg-total-big { font-size: 22px; font-weight: 800; color: var(--green); margin-top: 2px; }

    .agg-row {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      border-bottom: 1px solid #f8fafc;
    }
    .agg-row:last-child { border-bottom: none; }
    .agg-icon  { font-size: 18px; flex-shrink: 0; }
    .agg-name  { font-size: 13px; font-weight: 500; min-width: 95px; }
    .agg-bar-track { flex: 1; background: #f1f5f9; border-radius: 4px; height: 7px; overflow: hidden; }
    .agg-bar-fill  { height: 100%; border-radius: 4px; }
    .agg-amt   { font-size: 13px; font-weight: 700; min-width: 70px; text-align: right; }

    .day-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .day-table th {
      background: #f8fafc; padding: 7px 14px;
      text-align: left; font-size: 10px; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
    }
    .day-table th:last-child { text-align: right; }
    .day-table td { padding: 7px 14px; border-bottom: 1px solid #f8fafc; }
    .day-table td:last-child { text-align: right; font-weight: 600; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state .ei { font-size: 44px; margin-bottom: 10px; }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    /* ── Payment split row ── */
    .pay-split-card {
      background: white; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 15px; margin-bottom: 10px;
    }
    .pay-split-title {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px;
    }
    .pay-split-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .pay-split-item { display: flex; flex-direction: column; gap: 5px; }
    .pay-split-label {
      font-size: 12px; font-weight: 700; color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }
    .pay-split-input {
      padding: 10px 12px; border: 2px solid var(--border); border-radius: 10px;
      font-size: 16px; font-weight: 700; font-family: 'Inter', sans-serif;
      outline: none; color: var(--text); background: #f8fafc;
      width: 100%; transition: border-color .2s, background .2s;
    }
    .pay-split-input:focus { border-color: var(--primary); background: #fff; }
    .pay-split-input.cash-filled  { border-color: #10b981; background: #f0fdf4; color: #065f46; }
    .pay-split-input.online-filled { border-color: #3b82f6; background: #eff6ff; color: #1e40af; }
    .pay-split-check {
      font-size: 11px; font-weight: 600; margin-top: 8px; padding: 6px 10px;
      border-radius: 8px; text-align: center;
    }
    .pay-split-check.ok  { background: #f0fdf4; color: #065f46; }
    .pay-split-check.err { background: #fef2f2; color: #991b1b; }

    /* ── Delete confirm modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 999;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white; border-radius: 16px; padding: 22px 20px;
      max-width: 320px; width: 100%; text-align: center;
    }
    .modal-box .mi { font-size: 36px; margin-bottom: 10px; }
    .modal-box h3  { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .modal-box p   { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
    .modal-btns    { display: flex; gap: 10px; }
    .btn-cancel {
      flex: 1; padding: 11px; border-radius: 9px; font-size: 14px;
      font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;
      border: 1.5px solid var(--border); background: white; color: var(--text);
    }
    .btn-confirm-del {
      flex: 1; padding: 11px; border-radius: 9px; font-size: 14px;
      font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;
      border: none; background: var(--red); color: white;
    }
  </style>
  <!-- ── Role Guard ── -->
  <script>
  (function(){
    var role=sessionStorage.getItem('fc_role');
    if(!role){window.location.href='index.html';return;}
    if(role==='admin')return;
    var mid='revenue';
    var cfg={};
    try{cfg=JSON.parse(localStorage.getItem('fc_role_config'))||{};}catch(e){}
    var DEF={revenue:'edit',pnl:'edit',store:'edit',purchases:'edit',usage:'edit',payroll:'edit',expenses:'edit'};
    var access=(cfg[role]&&cfg[role][mid])?cfg[role][mid]:(DEF[mid]||'none');
    if(access==='none'){window.location.href='index.html';return;}
    if(access==='view'){
      document.addEventListener('DOMContentLoaded',function(){
        document.body.classList.add('fc-readonly');
      });
    }
  })();
  </script>
  <style>
  /* ── Read-only mode ── */
  .fc-readonly .btn-save,.fc-readonly .btn-del-entry,.fc-readonly .btn-settings,
  .fc-readonly .btn-add,.fc-readonly .btn-primary,.fc-readonly .btn-green,
  .fc-readonly .btn-orange,.fc-readonly .icon-btn-del,.fc-readonly .hbtn-white,
  .fc-readonly .mbtn-save,.fc-readonly .mbtn-del,.fc-readonly .submit-btn,
  .fc-readonly .new-entry-btn,.fc-readonly .hist-del-btn,.fc-readonly .del-confirm,
  .fc-readonly .exp-add-btn,.fc-readonly .exp-remove-btn{display:none!important;}
  #fc-readonly-banner{display:none;background:#eff6ff;border-bottom:2px solid #bfdbfe;
    padding:9px 16px;font-size:12px;color:#1d4ed8;text-align:center;font-weight:600;}
  .fc-readonly #fc-readonly-banner{display:block!important;}
  </style>
</head>
<body>
<div id="fc-readonly-banner">👁 View-only mode — you can browse data but cannot make changes</div>

<div class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <a href="index.html" style="color:rgba(255,255,255,.75);font-size:18px;text-decoration:none;line-height:1" title="Home">←</a>
    <div>
      <div class="header-title">💰 Daily Revenue</div>
      <div class="header-sub">Section-wise income tracker</div>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-entry"   onclick="switchTab('entry',this)">📝 Entry</div>
  <div class="tab"        id="tab-history" onclick="switchTab('history',this)">📋 History</div>
  <div class="tab"        id="tab-weekly"  onclick="switchTab('weekly',this)">📊 Weekly</div>
  <div class="tab"        id="tab-monthly" onclick="switchTab('monthly',this)">📅 Monthly</div>
</div>

<div class="content" id="content"></div>

<!-- Delete modal -->
<div class="modal-overlay" id="delModal">
  <div class="modal-box">
    <div class="mi">🗑️</div>
    <h3>Delete Entry?</h3>
    <p>This will remove the revenue record for this date. This cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDelModal()">Cancel</button>
      <button class="btn-confirm-del" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
const SECTIONS = [
  { id:'tiffin',  labelEn:'Tiffins',      labelTe:'టిఫిన్స్',    icon:'🍳', color:'#f97316' },
  { id:'meals',   labelEn:'Meals',        labelTe:'భోజనాలు',      icon:'🍽️', color:'#10b981' },
  { id:'chat',    labelEn:'Chat',         labelTe:'చాట్',         icon:'🥙', color:'#ec4899' },
  { id:'catreen', labelEn:'Catreen',      labelTe:'కాంటీన్',      icon:'🥘', color:'#8b5cf6' },
  { id:'water',   labelEn:'Water Bottle', labelTe:'వాటర్ బాటిల్', icon:'💧', color:'#0ea5e9' },
];

// ── State ──────────────────────────────────────────────────────────
let currentTab   = 'entry';
let entryDate    = todayStr();
let weeklyDate   = todayStr();
let monthlyMonth = currentMonthStr();
let deleteId     = null;

// ── Date helpers ──────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().split('T')[0]; }
function currentMonthStr() { return todayStr().substring(0,7); }
function daysInMonth(ym) {
  const [y,m] = ym.split('-').map(Number);
  return new Date(y, m, 0).getDate();
}
function fmtDate(d) {
  return new Date(d+'T00:00:00').toLocaleDateString('en-IN',
    {weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
function fmtDateShort(d) {
  return new Date(d+'T00:00:00').toLocaleDateString('en-IN',
    {day:'numeric',month:'short'});
}
function fmtDay(d) {
  return new Date(d+'T00:00:00').toLocaleDateString('en-IN',
    {weekday:'short',day:'numeric'});
}
function fmt(n) { return '₹'+Math.round(n||0).toLocaleString('en-IN'); }

function getWeekDates(dateStr) {
  const d   = new Date(dateStr+'T00:00:00');
  const dow = d.getDay();
  const diff = dow===0 ? -6 : 1-dow;
  const mon = new Date(d); mon.setDate(d.getDate()+diff);
  return Array.from({length:7},(_,i)=>{
    const dd = new Date(mon); dd.setDate(mon.getDate()+i);
    return dd.toISOString().split('T')[0];
  });
}
function getDatesInMonth(ym) {
  return Array.from({length:daysInMonth(ym)},(_,i)=>
    `${ym}-${String(i+1).padStart(2,'0')}`);
}

// ── Storage ───────────────────────────────────────────────────────
function getAll() {
  try { return JSON.parse(localStorage.getItem('fc_revenue_v2'))||[]; }
  catch { return []; }
}
function saveAll(arr) { localStorage.setItem('fc_revenue_v2',JSON.stringify(arr)); }
function getForDate(date) { return getAll().find(r=>r.date===date)||null; }

// ── ENTRY TAB ─────────────────────────────────────────────────────
function renderEntry() {
  const existing  = getForDate(entryDate);
  const isEditing = !!existing;

  const vals = {};
  if (existing?.sections) {
    for (const s of SECTIONS)
      vals[s.id] = existing.sections[s.id]?.total || 0;
  }

  const initTotal  = Object.values(vals).reduce((a,b)=>a+b,0);
  const initCash   = existing?.dayCash   ?? '';
  const initOnline = existing?.dayOnline ?? '';

  const cards = SECTIONS.map(s => {
    const v      = vals[s.id] || '';
    const hasVal = (v > 0);
    const style  = hasVal
      ? `border-color:${s.color};background:${s.color}11;color:${s.color}`
      : '';
    return `
      <div class="section-card">
        <div class="sec-icon" style="background:${s.color}22">${s.icon}</div>
        <div class="sec-info">
          <div class="sec-label-en">${s.labelEn}</div>
          <div class="sec-label-te">${s.labelTe}</div>
        </div>
        <div class="sec-input-wrap">
          <span class="sec-rupee">₹</span>
          <input class="sec-input ${hasVal?'has-value':''}"
                 type="number" inputmode="numeric" min="0"
                 id="sec-${s.id}" placeholder="0"
                 value="${v||''}"
                 oninput="onSecInput(this,'${s.color}')"
                 style="${style}">
        </div>
      </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="date-bar">
      <label>📅 Date</label>
      <input type="date" id="entry-date" value="${entryDate}"
             onchange="entryDate=this.value;renderEntry()">
    </div>
    <div class="edit-banner ${isEditing?'show':''}" id="editBanner">
      ✏️ Entry exists for this date — editing it.
    </div>
    <div id="successFlash" class="success-flash"></div>
    ${cards}
    <div class="total-bar">
      <div class="total-label">Grand Total</div>
      <div class="total-value" id="grandTotal">${fmt(initTotal)}</div>
    </div>

    <!-- Payment split -->
    <div class="pay-split-card">
      <div class="pay-split-title">💳 How was it received?</div>
      <div class="pay-split-row">
        <div class="pay-split-item">
          <div class="pay-split-label">💵 Physical Cash</div>
          <input class="pay-split-input ${initCash>0?'cash-filled':''}"
                 type="number" inputmode="numeric" min="0"
                 id="day-cash" placeholder="0"
                 value="${initCash}"
                 oninput="onSplitInput()">
        </div>
        <div class="pay-split-item">
          <div class="pay-split-label">📱 Online / UPI</div>
          <input class="pay-split-input ${initOnline>0?'online-filled':''}"
                 type="number" inputmode="numeric" min="0"
                 id="day-online" placeholder="0"
                 value="${initOnline}"
                 oninput="onSplitInput()">
        </div>
      </div>
      <div class="pay-split-check" id="split-check"></div>
    </div>

    <button class="btn-save ${isEditing?'editing':''}" onclick="saveEntry()">
      ${isEditing ? '✏️ Update Entry' : '✅ Save Entry'}
    </button>`;

  // Run initial split check if values exist
  if (initCash !== '' || initOnline !== '') onSplitInput();
}

function onSecInput(inp, color) {
  const v = parseFloat(inp.value)||0;
  if (v>0) {
    inp.classList.add('has-value');
    inp.style.borderColor = color;
    inp.style.background  = color+'11';
    inp.style.color       = color;
  } else {
    inp.classList.remove('has-value');
    inp.style.borderColor = inp.style.background = inp.style.color = '';
  }
  let total = 0;
  for (const s of SECTIONS) {
    const el = document.getElementById('sec-'+s.id);
    if (el) total += parseFloat(el.value)||0;
  }
  const gt = document.getElementById('grandTotal');
  if (gt) gt.textContent = fmt(total);
}

function onSplitInput() {
  const cashEl   = document.getElementById('day-cash');
  const onlineEl = document.getElementById('day-online');
  const checkEl  = document.getElementById('split-check');
  if (!cashEl || !onlineEl || !checkEl) return;

  const cash   = parseFloat(cashEl.value)   || 0;
  const online = parseFloat(onlineEl.value) || 0;
  const split  = cash + online;

  // Style inputs
  cashEl.className   = 'pay-split-input' + (cash   > 0 ? ' cash-filled'   : '');
  onlineEl.className = 'pay-split-input' + (online > 0 ? ' online-filled' : '');

  // Get current grand total
  let grandTotal = 0;
  for (const s of SECTIONS) {
    const el = document.getElementById('sec-'+s.id);
    if (el) grandTotal += parseFloat(el.value) || 0;
  }

  if (split === 0) { checkEl.textContent = ''; checkEl.className = 'pay-split-check'; return; }

  if (Math.abs(split - grandTotal) < 0.01) {
    checkEl.textContent = `✅ Matches grand total — ${fmt(grandTotal)}`;
    checkEl.className   = 'pay-split-check ok';
  } else {
    const diff = grandTotal - split;
    checkEl.textContent = diff > 0
      ? `⚠️ Short by ${fmt(Math.abs(diff))} (total is ${fmt(grandTotal)})`
      : `⚠️ Exceeds total by ${fmt(Math.abs(diff))} (total is ${fmt(grandTotal)})`;
    checkEl.className = 'pay-split-check err';
  }
}

function saveEntry() {
  const sections = {};
  let grandTotal = 0;
  for (const s of SECTIONS) {
    const amt = parseFloat(document.getElementById('sec-'+s.id)?.value)||0;
    sections[s.id] = { total: amt };
    grandTotal += amt;
  }
  if (grandTotal===0) { flashMsg('⚠️ Please enter at least one amount.',false); return; }

  const dayCash   = parseFloat(document.getElementById('day-cash')?.value)   || 0;
  const dayOnline = parseFloat(document.getElementById('day-online')?.value) || 0;

  const all = getAll().filter(r=>r.date!==entryDate);
  all.push({ id:'rev_'+Date.now(), date:entryDate, mode:'section', sections, grandTotal, dayCash, dayOnline });
  all.sort((a,b)=>b.date.localeCompare(a.date));
  saveAll(all);
  flashMsg(`✅ Saved — ${fmt(grandTotal)} for ${fmtDate(entryDate)}`, true);
  setTimeout(()=>renderEntry(), 1400);
}

function flashMsg(msg, ok) {
  const el = document.getElementById('successFlash');
  if (!el) return;
  el.innerHTML = `<div class="sf-icon">${ok?'✅':'⚠️'}</div>
    <div class="sf-text" style="color:${ok?'var(--green)':'var(--red)'}">${msg}</div>`;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}

// ── HISTORY TAB ───────────────────────────────────────────────────
function renderHistory() {
  const all = getAll().slice().sort((a,b)=>b.date.localeCompare(a.date));

  if (all.length===0) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="ei">📭</div>
        <p>No entries yet.<br>Go to Entry tab to record today's revenue.</p>
      </div>`;
    return;
  }

  document.getElementById('content').innerHTML = all.map(r => {
    const rows = SECTIONS.map(s => {
      const amt = r.sections?.[s.id]?.total||0;
      if (!amt) return '';
      return `<div class="hist-row">
        <span class="hist-sec-icon">${s.icon}</span>
        <span class="hist-sec-name">${s.labelEn}</span>
        <span class="hist-sec-amt" style="color:${s.color}">${fmt(amt)}</span>
      </div>`;
    }).join('');

    // Cash / online summary row
    const hasSplit = (r.dayCash > 0 || r.dayOnline > 0);
    const splitRow = hasSplit ? `
      <div class="hist-row" style="background:#f8fafc;border-top:1px solid var(--border);gap:8px;flex-wrap:wrap">
        <span style="font-size:12px;font-weight:600;color:var(--muted);flex:1">💳 Received via</span>
        ${r.dayCash   > 0 ? `<span style="font-size:12px;font-weight:700;background:#f0fdf4;color:#065f46;padding:3px 10px;border-radius:999px">💵 Cash ${fmt(r.dayCash)}</span>`   : ''}
        ${r.dayOnline > 0 ? `<span style="font-size:12px;font-weight:700;background:#eff6ff;color:#1e40af;padding:3px 10px;border-radius:999px">📱 Online ${fmt(r.dayOnline)}</span>` : ''}
      </div>` : '';

    // Show small badges in header too
    const headerBadges = hasSplit ? `
      <div style="display:flex;gap:4px;margin-top:3px">
        ${r.dayCash   > 0 ? `<span style="font-size:10px;font-weight:700;background:#dcfce7;color:#166534;padding:2px 7px;border-radius:999px">💵 ${fmt(r.dayCash)}</span>`   : ''}
        ${r.dayOnline > 0 ? `<span style="font-size:10px;font-weight:700;background:#dbeafe;color:#1e40af;padding:2px 7px;border-radius:999px">📱 ${fmt(r.dayOnline)}</span>` : ''}
      </div>` : '';

    return `
      <div class="hist-entry" id="he-${r.id}">
        <div class="hist-head" onclick="toggleHist('${r.id}')">
          <div>
            <div class="hist-date">${fmtDate(r.date)}</div>
            ${headerBadges}
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="hist-total">${fmt(r.grandTotal)}</div>
            <span class="hist-arrow">▼</span>
          </div>
        </div>
        <div class="hist-body" id="hb-${r.id}">
          ${rows}
          ${splitRow}
          <div class="hist-actions">
            <button class="btn-edit-entry" onclick="goEdit('${r.date}')">✏️ Edit</button>
            <button class="btn-del-entry"  onclick="askDelete('${r.id}')">🗑</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleHist(id) {
  document.querySelector(`#he-${id} .hist-head`).classList.toggle('open');
  document.getElementById('hb-'+id).classList.toggle('open');
}
function goEdit(date) {
  entryDate = date; switchTabById('entry');
}

// ── WEEKLY TAB ────────────────────────────────────────────────────
function renderWeekly() {
  const dates = getWeekDates(weeklyDate);
  const all   = getAll();
  const secTot = {}; for (const s of SECTIONS) secTot[s.id]=0;
  let weekTotal = 0, weekCash = 0, weekOnline = 0;

  const dayData = dates.map(date => {
    const r  = all.find(e=>e.date===date);
    let dt = 0;
    for (const s of SECTIONS) {
      const v = r?.sections?.[s.id]?.total||0;
      secTot[s.id]+=v; dt+=v;
    }
    weekTotal  += dt;
    weekCash   += r?.dayCash   || 0;
    weekOnline += r?.dayOnline || 0;
    return {date, total:dt, cash:r?.dayCash||0, online:r?.dayOnline||0};
  });

  const maxSec = Math.max(...Object.values(secTot),1);
  const secRows = SECTIONS.map(s=>{
    const pct = Math.round(secTot[s.id]/maxSec*100);
    return `<div class="agg-row">
      <span class="agg-icon">${s.icon}</span>
      <span class="agg-name">${s.labelEn}</span>
      <div class="agg-bar-track"><div class="agg-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
      <span class="agg-amt" style="color:${s.color}">${fmt(secTot[s.id])}</span>
    </div>`;
  }).join('');

  const dayRows = dayData.map(d=>`<tr>
    <td>${fmtDay(d.date)}</td>
    <td style="color:${d.total>0?'var(--green)':'var(--muted)'}">${d.total>0?fmt(d.total):'—'}</td>
    <td>${d.cash>0?`<span style="font-size:11px;font-weight:700;color:#065f46">💵 ${fmt(d.cash)}</span>`:'—'}</td>
    <td>${d.online>0?`<span style="font-size:11px;font-weight:700;color:#1e40af">📱 ${fmt(d.online)}</span>`:'—'}</td>
  </tr>`).join('');

  const payRows = (weekCash > 0 || weekOnline > 0) ? `
    <div class="agg-row">
      <span class="agg-icon">💵</span>
      <span class="agg-name">Cash</span>
      <div class="agg-bar-track"><div class="agg-bar-fill" style="width:${weekTotal?Math.round(weekCash/weekTotal*100):0}%;background:#10b981"></div></div>
      <span class="agg-amt" style="color:#065f46">${fmt(weekCash)}</span>
    </div>
    <div class="agg-row">
      <span class="agg-icon">📱</span>
      <span class="agg-name">Online / UPI</span>
      <div class="agg-bar-track"><div class="agg-bar-fill" style="width:${weekTotal?Math.round(weekOnline/weekTotal*100):0}%;background:#3b82f6"></div></div>
      <span class="agg-amt" style="color:#1e40af">${fmt(weekOnline)}</span>
    </div>` : `<div style="padding:10px 14px;font-size:12px;color:var(--muted)">No payment split recorded for this week yet.</div>`;

  document.getElementById('content').innerHTML = `
    <div class="period-bar">
      <label>📅 Week of</label>
      <input type="date" value="${weeklyDate}" onchange="weeklyDate=this.value;renderWeekly()">
    </div>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px">
      ${dates[0]} &nbsp;→&nbsp; ${dates[6]}
    </div>
    <div class="agg-card">
      <div class="agg-head"><h3>📊 Week Total</h3><div class="agg-total-big">${fmt(weekTotal)}</div></div>
      ${secRows}
    </div>
    <div class="agg-card">
      <div class="agg-head"><h3>💳 Cash vs Online</h3></div>
      ${payRows}
    </div>
    <div class="agg-card">
      <div class="agg-head"><h3>📆 Day-by-Day</h3></div>
      <table class="day-table">
        <thead><tr><th>Day</th><th>Total</th><th>💵 Cash</th><th>📱 Online</th></tr></thead>
        <tbody>${dayRows}</tbody>
      </table>
    </div>`;
}

// ── MONTHLY TAB ───────────────────────────────────────────────────
function renderMonthly() {
  const dates = getDatesInMonth(monthlyMonth);
  const all   = getAll();
  const secTot = {}; for (const s of SECTIONS) secTot[s.id]=0;
  let monthTotal = 0, monthCash = 0, monthOnline = 0;

  const dayData = dates.map(date=>{
    const r = all.find(e=>e.date===date);
    let dt = 0;
    for (const s of SECTIONS) {
      const v = r?.sections?.[s.id]?.total||0;
      secTot[s.id]+=v; dt+=v;
    }
    monthTotal  += dt;
    monthCash   += r?.dayCash   || 0;
    monthOnline += r?.dayOnline || 0;
    return {date, total:dt, cash:r?.dayCash||0, online:r?.dayOnline||0, has:!!r};
  });

  const daysRec = dayData.filter(d=>d.has);
  const maxSec  = Math.max(...Object.values(secTot),1);

  const secRows = SECTIONS.map(s=>{
    const pct = Math.round(secTot[s.id]/maxSec*100);
    return `<div class="agg-row">
      <span class="agg-icon">${s.icon}</span>
      <span class="agg-name">${s.labelEn}</span>
      <div class="agg-bar-track"><div class="agg-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
      <span class="agg-amt" style="color:${s.color}">${fmt(secTot[s.id])}</span>
    </div>`;
  }).join('');

  const payRows = (monthCash > 0 || monthOnline > 0) ? `
    <div class="agg-row">
      <span class="agg-icon">💵</span>
      <span class="agg-name">Cash</span>
      <div class="agg-bar-track"><div class="agg-bar-fill" style="width:${monthTotal?Math.round(monthCash/monthTotal*100):0}%;background:#10b981"></div></div>
      <span class="agg-amt" style="color:#065f46">${fmt(monthCash)}</span>
    </div>
    <div class="agg-row">
      <span class="agg-icon">📱</span>
      <span class="agg-name">Online / UPI</span>
      <div class="agg-bar-track"><div class="agg-bar-fill" style="width:${monthTotal?Math.round(monthOnline/monthTotal*100):0}%;background:#3b82f6"></div></div>
      <span class="agg-amt" style="color:#1e40af">${fmt(monthOnline)}</span>
    </div>` : `<div style="padding:10px 14px;font-size:12px;color:var(--muted)">No payment split recorded for this month yet.</div>`;

  const dayRows = daysRec.map(d=>`<tr>
    <td>${fmtDateShort(d.date)}</td>
    <td style="color:var(--green)">${fmt(d.total)}</td>
    <td>${d.cash>0?`<span style="font-size:11px;font-weight:700;color:#065f46">💵 ${fmt(d.cash)}</span>`:'—'}</td>
    <td>${d.online>0?`<span style="font-size:11px;font-weight:700;color:#1e40af">📱 ${fmt(d.online)}</span>`:'—'}</td>
  </tr>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="period-bar">
      <label>📅 Month</label>
      <input type="month" value="${monthlyMonth}" onchange="monthlyMonth=this.value;renderMonthly()">
    </div>
    <div class="agg-card">
      <div class="agg-head">
        <h3>📊 Month Total &nbsp;<span style="font-size:11px;color:var(--muted);font-weight:400">${daysRec.length}/${dates.length} days recorded</span></h3>
        <div class="agg-total-big">${fmt(monthTotal)}</div>
      </div>
      ${secRows}
    </div>
    <div class="agg-card">
      <div class="agg-head"><h3>💳 Cash vs Online</h3></div>
      ${payRows}
    </div>
    ${daysRec.length>0 ? `
    <div class="agg-card">
      <div class="agg-head"><h3>📋 Daily Records</h3></div>
      <table class="day-table">
        <thead><tr><th>Date</th><th>Total</th><th>💵 Cash</th><th>📱 Online</th></tr></thead>
        <tbody>${dayRows}</tbody>
      </table>
    </div>` : `
    <div class="empty-state"><div class="ei">📭</div><p>No entries for this month yet.</p></div>`}`;
}

// ── DELETE ────────────────────────────────────────────────────────
function askDelete(id) { deleteId=id; document.getElementById('delModal').classList.add('open'); }
function closeDelModal() { deleteId=null; document.getElementById('delModal').classList.remove('open'); }
function confirmDelete() {
  if (!deleteId) return;
  saveAll(getAll().filter(r=>r.id!==deleteId));
  closeDelModal(); renderHistory();
}

// ── TABS ──────────────────────────────────────────────────────────
function switchTab(tab,el) {
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if (el) el.classList.add('active');
  renderContent();
}
function switchTabById(tab) {
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const el=document.getElementById('tab-'+tab);
  if (el) el.classList.add('active');
  renderContent();
}
function renderContent() {
  if      (currentTab==='entry')   renderEntry();
  else if (currentTab==='history') renderHistory();
  else if (currentTab==='weekly')  renderWeekly();
  else if (currentTab==='monthly') renderMonthly();
}

fcInit(function(){ renderContent(); });
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}</script>
</body>
